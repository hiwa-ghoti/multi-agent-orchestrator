<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>multi-agent-orchestrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="brand">multi-agent-orchestrator</p>
        <h1>ローカル実行パネル</h1>
        <p class="lede">
          コマンドを打たずに once / parallel / loop を実行します。API
          キーはサーバー側の <code>.env</code> だけを使います。
        </p>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="tabs" role="tablist">
            <button class="tab active" data-mode="once" type="button">once</button>
            <button class="tab" data-mode="parallel" type="button">parallel</button>
            <button class="tab" data-mode="loop" type="button">loop</button>
          </div>

          <form id="run-form" class="form">
            <div class="field" data-show="once loop">
              <label for="prompt">プロンプト</label>
              <textarea
                id="prompt"
                rows="5"
                placeholder="例: このリポジトリの構成を短く説明して。ファイルは変えないで"
              ></textarea>
            </div>

            <div class="field hidden" data-show="parallel">
              <div class="field-head">
                <label for="tasks-json">タスク JSON</label>
                <button id="load-sample" type="button" class="linkish">
                  サンプルを読み込む
                </button>
              </div>
              <textarea id="tasks-json" rows="12" spellcheck="false"></textarea>
              <p class="hint">空のまま実行すると examples/tasks.sample.json を使います。</p>
            </div>

            <div class="row hidden" data-show="loop">
              <div class="field">
                <label for="max-steps">max steps</label>
                <input id="max-steps" type="number" min="1" value="3" />
              </div>
              <div class="field">
                <label for="max-minutes">max minutes</label>
                <input id="max-minutes" type="number" min="1" value="10" />
              </div>
              <label class="check">
                <input id="resume" type="checkbox" />
                resume（前回の続き）
              </label>
            </div>

            <div class="actions">
              <button id="run-btn" class="primary" type="submit">実行</button>
              <button id="cancel-btn" class="ghost" type="button" disabled>停止</button>
              <span id="status-pill" class="pill">待機中</span>
            </div>
          </form>
        </section>

        <section class="panel log-panel">
          <div class="field-head">
            <h2>ログ</h2>
            <button id="clear-log" type="button" class="linkish">クリア</button>
          </div>
          <pre id="log" class="log" aria-live="polite"></pre>
        </section>
      </main>

      <footer class="foot">
        <span>localhost のみで待ち受け（127.0.0.1）</span>
        <span>CLI も引き続き利用可: <code>npm run agent -- help</code></span>
      </footer>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
